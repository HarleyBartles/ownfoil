<script>
    let games = [];
    let filteredGames = [];
    let itemsPerPage = 12;
    let currentPage = 1;
    let totalGames = 0;
    let cardSize = 3; // Default card size
    let currentView = 'card'; // Default view is 'card'
    // --- Banner editor state (per modal open) ---
    let bannerFileToUpload = null;     // File object or null
    let bannerRemoveRequested = false; // bool
    let iconFileToUpload   = null;     // File object or null
    let iconRemoveRequested = false;   // bool

    // Forces browsers to refetch updated artwork after saves/resets
    let ARTWORK_BUSTER = Date.now();

    // --- Overrides state ---
    // key: title_id or "file:<file_basename>"  -> override object
    const overridesByKey = new Map();
    const overrideModal = () => bootstrap.Modal.getOrCreateInstance('#overrideEditorModal');

    // --- Default artwork fallbacks ---
    const DEFAULT_BANNER = window.DEFAULT_BANNER;
    const DEFAULT_ICON   = window.DEFAULT_ICON;

    function _trimmedOrNull(u) { return (typeof u === 'string' && u.trim().length) ? u.trim() : null; }

    function addBuster(url){
        if (!url) return url;
        return `${url}${url.includes('?') ? '&' : '?'}b=${ARTWORK_BUSTER}`;
    }

    // --- Helpers to correlate overrides <-> games and mutate UI state ---
    function keyForGame(game) {
        if (game?.title_id) return game.title_id;
        if (game?.file_basename) return 'file:' + game.file_basename;
        return '';
    }
    function keyForOverride(ovr) {
        if (ovr.title_id) return ovr.title_id;
        if (ovr.file_basename) return 'file:' + ovr.file_basename;
        return '';
    }

    // Apply (or remove) a single override onto matching games in memory.
    // - Only overlays display fields (e.g., name/title_id_name)
    // - Preserves is_unrecognized flag as-is.
    function applyOverrideToGamesByKey(key) {
        if (!key) return;
        const ovr = overridesByKey.get(key) || null;
        const affecteds = games.filter(g => keyForGame(g) === key);

        affecteds.forEach(g => {
            if (!g._orig) {
                g._orig = {
                    name: g.name,
                    title_id_name: g.title_id_name
                };
            }

            if (ovr && ovr.enabled !== false) {
                if (ovr.name && typeof ovr.name === 'string' && ovr.name.trim().length) {
                    g.title_id_name = ovr.name;
                    g.name = ovr.name;
                }
            } else {
                // revert just the display fields; leave has_override alone (API is source of truth)
                if (g._orig) {
                    g.title_id_name = g._orig.title_id_name;
                    g.name = g._orig.name;
                }
            }
        });
    }

    // Re-apply all overrides (fallback use, e.g., after bulk fetch)
    function reapplyAllOverridesToGames() {
        const keys = new Set();
        games.forEach(g => keys.add(keyForGame(g)));
        keys.forEach(k => applyOverrideToGamesByKey(k));
    }

    async function fetchOverrides() {
        try {
            const res = await fetch('/api/overrides', { cache: 'no-store' });
            if (!res.ok) {
                overridesByKey.clear();
                return;
            }
            const list = await res.json();
            overridesByKey.clear();
            (Array.isArray(list.items) ? list.items : []).forEach(o => {
                const k = keyForOverride(o);
                if (k) overridesByKey.set(k, o);
            });
            // Overlay into current games after fetching
            reapplyAllOverridesToGames();
        } catch {
            overridesByKey.clear();
        }
    }

    function hasActiveOverride(game) {
        const o = getOverrideForGame(game);
        return !!(o && o.enabled !== false);
    }

    function computeRecognitionFlags(game) {
        const tidNameRaw = (game?._orig?.title_id_name ?? game.title_id_name ?? '').trim();
        const hasTitleDb =
            !!tidNameRaw &&
            tidNameRaw.toLowerCase() !== 'unrecognized' &&
            tidNameRaw.toLowerCase() !== 'unidentified';
        return { isUnrecognized: !hasTitleDb, hasTitleDb };
    }

    const isUnrecognizedGame = (game) => {
        if (!game) return false;
        if (typeof game.isUnrecognized === 'boolean') return game.isUnrecognized;
        const flags = computeRecognitionFlags(game);
        // cache on object for reuse
        game.isUnrecognized = flags.isUnrecognized;
        game.hasTitleDb = flags.hasTitleDb;
        return game.isUnrecognized;
    };

    function getOverrideForGame(game){
        const k = keyForGame(game);
        return k ? overridesByKey.get(k) : null;
    }

    function bannerUrlFor(game){
        const ovr = getOverrideForGame(game);
        const ovrUrl = _trimmedOrNull(ovr?.banner_path) || _trimmedOrNull(ovr?.bannerUrl);
        if (ovrUrl) return addBuster(ovrUrl);

        return (
            _trimmedOrNull(game.banner_path) || _trimmedOrNull(game.bannerUrl) || _trimmedOrNull(game.banner) ||
            _trimmedOrNull(game.iconUrl) || DEFAULT_BANNER
        );
    }

    function iconUrlFor(game){
        const ovr = getOverrideForGame(game);
        const ovrUrl = _trimmedOrNull(ovr?.icon_path) || _trimmedOrNull(ovr?.iconUrl);
        if (ovrUrl) return addBuster(ovrUrl);

        return (
            _trimmedOrNull(game.iconUrl) || _trimmedOrNull(game.icon) ||
            _trimmedOrNull(game.banner_path) || _trimmedOrNull(game.bannerUrl) || _trimmedOrNull(game.banner) ||
            DEFAULT_ICON
        );
    }

    // Crop a chosen file to 400x225 (center-cover) and return a PNG data URL via callback
    function cropBannerFileToDataURL(file, callback) {
        const TARGET_W = 400, TARGET_H = 225;
        const img = new Image();
        const url = URL.createObjectURL(file);

        img.onload = () => {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = TARGET_W;
                canvas.height = TARGET_H;
                const ctx = canvas.getContext('2d');

                const srcW = img.naturalWidth || img.width;
                const srcH = img.naturalHeight || img.height;
                if (!srcW || !srcH) {
                    URL.revokeObjectURL(url);
                    return callback(null);
                }

                // Cover-scale first
                const scale = Math.max(TARGET_W / srcW, TARGET_H / srcH);
                const drawW = Math.round(srcW * scale);
                const drawH = Math.round(srcH * scale);
                const dx = Math.round((TARGET_W - drawW) / 2);
                const dy = Math.round((TARGET_H - drawH) / 2);

                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.clearRect(0, 0, TARGET_W, TARGET_H);
                ctx.drawImage(img, dx, dy, drawW, drawH);

                const dataURL = canvas.toDataURL('image/png');
                URL.revokeObjectURL(url);
                callback(dataURL);
            } catch (e) {
                URL.revokeObjectURL(url);
                callback(null);
            }
        };

        img.onerror = () => {
            URL.revokeObjectURL(url);
            callback(null);
        };

        img.src = url;
    }

    // Crop to a 400x400 square (center-cover), return PNG data URL via callback
    function cropIconFileToDataURL(file, callback) {
        const TARGET = 400;
        const img = new Image();
        const url = URL.createObjectURL(file);

        img.onload = () => {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = TARGET;
                canvas.height = TARGET;
                const ctx = canvas.getContext('2d');

                const srcW = img.naturalWidth || img.width;
                const srcH = img.naturalHeight || img.height;
                if (!srcW || !srcH) {
                    URL.revokeObjectURL(url);
                    return callback(null);
                }

                const scale = Math.max(TARGET / srcW, TARGET / srcH);
                const drawW = Math.round(srcW * scale);
                const drawH = Math.round(srcH * scale);
                const dx = Math.round((TARGET - drawW) / 2);
                const dy = Math.round((TARGET - drawH) / 2);

                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.clearRect(0, 0, TARGET, TARGET);
                ctx.drawImage(img, dx, dy, drawW, drawH);

                const dataURL = canvas.toDataURL('image/png');
                URL.revokeObjectURL(url);
                callback(dataURL);
            } catch (e) {
                URL.revokeObjectURL(url);
                callback(null);
            }
        };

        img.onerror = () => {
            URL.revokeObjectURL(url);
            callback(null);
        };

        img.src = url;
    }

    function fetchGames() {
        return new Promise((resolve) => {
            $.get(`/api/titles`, function (data) {
                const list = Array.isArray(data?.games) ? data.games : [];

                totalGames = Number.isFinite(data?.total) ? data.total : list.length;

                // Normalize each game: drop server-provided recognition flags
                // and attach client-computed ones that are invariant to overrides.
                games = list.map(g => {
                    // remove server-side flags to avoid drift
                    const clone = { ...g };

                    // compute & attach client flags
                    const flags = computeRecognitionFlags(clone);
                    clone.isUnrecognized = flags.isUnrecognized;
                    clone.hasTitleDb = flags.hasTitleDb;

                    return clone;
                });

                filteredGames = games.slice();  // shallow copy

                resolve();
            }).fail(function () {
                totalGames    = 0;
                games         = [];
                filteredGames = [];
                resolve();
            });
        });
    }


    function renderGames() {
        // Ensure we always have arrays
        if (!Array.isArray(games)) games = [];
        if (!Array.isArray(filteredGames)) filteredGames = [];

        // Set slider to show `cardsize` columns by default
        $('#cardSizeRange').val(cardSize);

        if (currentView === 'card') {
            renderCardView();
            adjustCardSizes();
        } else if (currentView === 'icon') {
            renderIconView();
            adjustIconSizes();
        }

        // init version tooltips
        const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
        const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))

        // init version popovers
        const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]')
        const popoverList = [...popoverTriggerList].map(popoverTriggerEl => new bootstrap.Popover(popoverTriggerEl))
    }

    function renderCardView() {
        // Render card view logic...
        const gameGrid = $('#gameGrid');
        gameGrid.empty(); // Clear existing games

        // Hard guard: nothing to render yet
        if (!Array.isArray(filteredGames) || filteredGames.length === 0) {
            gameGrid.append(`
                <div class="col-12 text-center text-muted py-5">
                    <div class="mb-2"><i class="bi bi-collection"></i></div>
                    <div>No titles to display yet.</div>
                </div>
            `);
            updatePaginationControls(0);
            return;
        }

        // Get games for the current page
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const paginatedGames = filteredGames.slice(start, end);

        paginatedGames.forEach(function (game) {
            const gameCol = $('<div class="col game-col"></div>').addClass(`col-${12 / getColumnsForCardSize(cardSize)}`);

            const card = $('<div class="card text-bg-dark game-card position-relative"></div>') // position-relative for star
                .attr('data-title-id', game.title_id || '')
                .attr('data-file-basename', game.file_basename || '')
                .attr('data-identification-type', (game.identification_type || '').toLowerCase());

            const img = $('<img class="card-img">')
                .attr('src', bannerUrlFor(game))
                .on('error', function () {
                    if (this.src !== DEFAULT_BANNER) this.src = DEFAULT_BANNER;
                });

            // --- Override star indicator (not clickable) ---

                .addClass('text-blue')
                .attr('title', hasOvr ? 'Override active' : 'No override');

                .append(star);
            card.append(starWrap);
            // ------------------------------------------------

            const cardOverlay = $('<div class="card-img-overlay game-info"></div>');

            // Title line with override editor pill
            const titleLine = $('<div class="d-flex align-items-center justify-content-between"></div>');
            const title = $('<h5 class="card-title game-title mb-1"></h5>').text(game.title_id_name || game.name || 'Unrecognized');
            titleLine.append(title);

            // Inline "Edit" entry point for overrides
            const editPill = $('<button type="button" class="override-pill btn btn-sm"></button>')
                .attr('title', 'Edit MetaData')
                .html('<i class="bi bi-pencil-square"></i>')
                .on('click', () => openOverrideEditor(game));
            titleLine.append(editPill);

            cardOverlay.append(titleLine);

            const description = $('<p class="card-text game-description mb-2"></p>');
            if (game.app_type === 'DLC') {
                const smallName = $('<small></small>').text(`${game.name} | `);
                description.append(smallName);
            }
            const smallId = $('<small></small>').text(game.id || game.title_id || game.app_id || '');
            description.append(smallId);
            cardOverlay.append(description);

            const tagsContainer = $('<div class="tags-container d-flex gap-1 align-items-center"></div>');

            const typeBadgeClass = (game.owned === false) ? 'text-bg-warning' : 'text-bg-info';
            const typeBadge = $(`<span class="badge rounded-pill ${typeBadgeClass} game-tag"></span>`).text(game.app_type);
            tagsContainer.append(typeBadge);

            if (game.has_latest_version !== undefined) {
                const versionBadge = $(`<span class="badge rounded-pill game-tag version-tag" title="${game.name} [${game.title_id}] Updates"></span>`)
                    .addClass(`text-bg-${game.has_latest_version ? 'success' : 'warning'}`)
                    .html(`<i class="bi ${game.has_latest_version ? 'bi-check-circle-fill' : 'bi-arrow-down-circle'}"></i>`);
                if (game.version !== undefined && game.version.length && Array.isArray(game.version)) {
                    const popoverContent = game.version.map(v =>
                        `${v.release_date}: v${v.version} ${v.owned ? 'Owned' : 'Missing'}`
                    ).join('<br>');
                    versionBadge
                        .attr('data-bs-toggle', 'popover')
                        .attr('data-bs-placement', 'top')
                        .attr('data-bs-trigger', 'click')
                        .attr('data-bs-custom-class', 'version-popover')
                        .attr('data-bs-title', `${game.name} [${game.title_id}] Updates`)
                        .attr('data-bs-content', popoverContent)
                        .attr('data-bs-html', 'true')
                        .css('cursor', 'pointer');
                } else {
                    // version tooltip on hover
                    versionBadge
                        .attr("data-bs-toggle", "tooltip")
                        .attr("data-bs-placement", "top");

                    if (game.version !== undefined && !game.version.length && Array.isArray(game.version)){
                        versionBadge.attr("data-bs-title", "Version v0")
                    } else if (game.version !== undefined && game.version.length) {
                        versionBadge.attr("data-bs-title", "Version v" + game.version)
                    }

                tagsContainer.append(versionBadge);

            if (game.has_all_dlcs !== undefined) {
                const dlcBadge = $('<span class="badge rounded-pill game-tag"></span>').addClass(`text-bg-${game.has_all_dlcs ? 'success' : 'warning'}`).html('<i class="bi bi-box-seam-fill"></i>');
                tagsContainer.append(dlcBadge);
            }

            cardOverlay.append(tagsContainer);
            card.append(cardOverlay);
            gameCol.append(card);
            gameGrid.append(gameCol);
        });
        // Update pagination
        updatePaginationControls(filteredGames.length);
    }

    function renderIconView() {
        // Render icon view logic...
        const gameGrid = $('#gameGrid');
        gameGrid.empty(); // Clear existing games

        // Hard guard: nothing to render yet
        if (!Array.isArray(filteredGames) || filteredGames.length === 0) {
            gameGrid.append(`
                <div class="col-12 text-center text-muted py-5">
                    <div class="mb-2"><i class="bi bi-collection"></i></div>
                    <div>No titles to display yet.</div>
                </div>
            `);
            updatePaginationControls(0);
            return;
        }

        // Get games for the current page
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const baseGames = filteredGames.filter(game => game.app_type === 'BASE');
        const paginatedGames = baseGames.slice(start, end);

        paginatedGames.forEach(game => {
            const icon = $('<img class="game-icon">')
                .attr('src', iconUrlFor(game))
                .on('error', function () {
                    if (this.src !== DEFAULT_ICON) this.src = DEFAULT_ICON;
                });

        });

        // Adjust icon sizes based on the slider value
        adjustIconSizes();
        // Update pagination
        updatePaginationControls(baseGames.length);

    function getColumnsForCardSize(size) {
        switch (size) {
            case 1: return 1; // 2 columns
            case 2: return 2; // 3 columns
            case 3: return 3; // 4 columns
            case 4: return 4; // 6 columns
            case 5: return 6; // 8 columns
            default: return 4; // default to 3 columns
        }
    }

    function updatePaginationControls(nbDisplayedGames) {
        const paginationControls = $('#paginationControls');
        paginationControls.empty(); // Clear existing pagination

        const totalPages = Math.max(1, Math.ceil(nbDisplayedGames / itemsPerPage));

        // Previous button
        const prevButton = $('<li class="page-item"></li>').addClass(`${currentPage === 1 ? 'disabled' : ''}`).html(`
                <a class="page-link" href="#" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                </a>`);
        prevButton.click(function (e) {
            e.preventDefault();
            if (currentPage > 1) {
                currentPage--;
                renderGames();
            }
        });
        paginationControls.append(prevButton);

        // Page numbers
        for (let i = 1; i <= totalPages; i++) {
            const pageButton = $('<li class="page-item"></li>').addClass(`${i === currentPage ? 'active' : ''}`).html(`<a class="page-link" href="#">${i}</a>`);
            pageButton.click(function (e) {
                e.preventDefault();
                currentPage = i;
                renderGames();
            });
            paginationControls.append(pageButton);
        }

        // Next button
        const nextButton = $('<li class="page-item"></li>').addClass(`${currentPage === totalPages ? 'disabled' : ''}`).html(`
                <a class="page-link" href="#" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                </a>`);
        nextButton.click(function (e) {
            e.preventDefault();
            if (currentPage < totalPages) {
                currentPage++;
                renderGames();
            }
        });
        paginationControls.append(nextButton);
    }

    function adjustCardSizes() {
        const gameGrid = $('#gameGrid');

            $(this).removeClass().addClass(`col game-col col-${12 / getColumnsForCardSize(cardSize)}`);
        });

    function adjustIconSizes() {
        // Calculate the size of the icons based on the slider value

        $('.game-icon').css('width', `${iconSize}%`);

    // --- Filter persistence
    function saveFiltersToStorage() {
        const filters = {
            type: [],
            ownership: [],
            update: [],
            completion: [],
            special: []
        };
        if ($('#filterCheckBase').is(':checked')) filters.type.push('BASE');
        if ($('#filterCheckDlc').is(':checked')) filters.type.push('DLC');

        if ($('#filterCheckOwned').is(':checked')) filters.ownership.push('Owned');
        if ($('#filterCheckMissing').is(':checked')) filters.ownership.push('Missing');

        if ($('#filterCheckUpToDate').is(':checked')) filters.update.push('Up to date');
        if ($('#filterCheckMissingUpdate').is(':checked')) filters.update.push('Outdated');

        if ($('#filterCheckComplete').is(':checked')) filters.completion.push('Complete');
        if ($('#filterCheckMissingDlc').is(':checked')) filters.completion.push('Missing DLC');

        if ($('#filterCheckUnrecognized').is(':checked')) filters.special.push('Unrecognized');
        if ($('#filterCheckOverridden').is(':checked')) filters.special.push('Overridden');

        localStorage.setItem('activeFilters', JSON.stringify(filters));
    }

    function loadFiltersFromStorage() {
        const savedFilters = localStorage.getItem('activeFilters');
        if (savedFilters) {
            const filters = JSON.parse(savedFilters);

            $('#filterCheckBase').prop('checked', filters.type?.includes('BASE') || false);
            $('#filterCheckDlc').prop('checked', filters.type?.includes('DLC') || false);

            $('#filterCheckOwned').prop('checked', filters.ownership?.includes('Owned') || false);
            $('#filterCheckMissing').prop('checked', filters.ownership?.includes('Missing') || false);

            $('#filterCheckUpToDate').prop('checked', filters.update?.includes('Up to date') || false);
            $('#filterCheckMissingUpdate').prop('checked', filters.update?.includes('Outdated') || false);

            $('#filterCheckComplete').prop('checked', filters.completion?.includes('Complete') || false);
            $('#filterCheckMissingDlc').prop('checked', filters.completion?.includes('Missing DLC') || false);

            $('#filterCheckUnrecognized').prop('checked', filters.special?.includes('Unrecognized') || false);
            $('#filterCheckOverridden').prop('checked', filters.special?.includes('Overridden') || false);

            updateFilter();
            applyFilters();
        }

        const savedSearch = localStorage.getItem('searchTerm');
        if (savedSearch) {
            $('#textFilter').val(savedSearch);
            filterBySearchText(savedSearch);
        } else {
            // ensure arrays exist before first render
            if (!Array.isArray(filteredGames)) filteredGames = [];
            renderGames();
        }
    }

                    };
                    fr.readAsDataURL(bannerFileToUpload);

        // Drag & drop support per preview tile
        function wireDropZone($wrap, kind) {
            const over = () => $wrap.addClass('dragover');
            const out  = () => $wrap.removeClass('dragover');

            $wrap.on('dragenter dragover', function(e){ e.preventDefault(); e.stopPropagation(); over(); });
            $wrap.on('dragleave dragend drop', function(e){ e.preventDefault(); e.stopPropagation(); out(); });

            $wrap.on('drop', function(e){
                const dt = e.originalEvent.dataTransfer;
                if (!dt || !dt.files || !dt.files.length) return;

                const file = dt.files[0];
                if (!file || !file.type || !file.type.startsWith('image/')) return;

                if (kind === 'banner') {
                    try {
                        // Some browsers disallow assigning to input.files — try first:
                        $('#ovr-banner-file')[0].files = dt.files;
                        $('#ovr-banner-file').trigger('change');
                    } catch {
                        // Fallback: process dropped file directly
                        bannerFileToUpload = file;
                        bannerRemoveRequested = false;
                        cropBannerFileToDataURL(file, function(dataURL){
                            if (dataURL) {
                                $('#ovr-banner-preview-img').attr('src', dataURL).removeData('ovr');
                                $('#ovr-banner-remove').show();
                            }
                            // auto-derive icon if needed and not already an override
                            if (!$('#ovr-icon-preview-img').data('ovr')) {
                                cropIconFileToDataURL(file, function(iconURL){
                                    $('#ovr-icon-preview-img').attr('src', iconURL || DEFAULT_ICON);
                                    if (iconURL) { $('#ovr-icon-remove').show(); $('#ovr-icon-preview-img').removeData('ovr'); }
                                });
                            }
                        });
                    }
                } else {
                    try {
                        $('#ovr-icon-file')[0].files = dt.files;
                        $('#ovr-icon-file').trigger('change');
                    } catch {
                        iconFileToUpload = file;
                        iconRemoveRequested = false;
                        cropIconFileToDataURL(file, function(dataURL){
                            if (dataURL) {
                                $('#ovr-icon-preview-img').attr('src', dataURL).removeData('ovr');
                                $('#ovr-icon-remove').show();
                            }
                            // derive banner if needed and not already an override
                            if (!$('#ovr-banner-preview-img').data('ovr')) {
                                cropBannerFileToDataURL(file, function(bannerURL){
                                    $('#ovr-banner-preview-img').attr('src', bannerURL || DEFAULT_BANNER);
                                    if (bannerURL) { $('#ovr-banner-remove').show(); $('#ovr-banner-preview-img').removeData('ovr'); }
                                });
                            }
                        });
                    }
                }
            });
        }

        wireDropZone($('#ovr-banner-preview'), 'banner');
        wireDropZone($('#ovr-icon-preview'),   'icon');
    });

    // Function to filter cards based on input text
    function filterBySearchText(attributeText) {
        if (!attributeText) {
            filteredGames = games;
        } else {
            const searchText = attributeText.toLowerCase();

            filteredGames = games.filter(game =>
                game.app_id?.toLowerCase().includes(searchText) ||
                game.title_id?.toLowerCase().includes(searchText) ||
                game.name?.toLowerCase().includes(searchText) ||
                game.title_id_name?.toLowerCase().includes(searchText)
            );
        }

        currentPage = 1;
        renderGames();
    }

    // Set to store active filters
    const activeTypeFilters = new Set();
    const activeOwnershipFilters = new Set();
    const activeUpdateFilters = new Set();
    const activeCompletionFilters = new Set();
    const activeSpecialFilters = new Set();

    function updateFilter() {
        // Type
        $('#filterCheckBase').is(":checked") ? activeTypeFilters.add('BASE') : activeTypeFilters.delete('BASE');
        $('#filterCheckDlc').is(":checked") ? activeTypeFilters.add('DLC') : activeTypeFilters.delete('DLC');

        // Ownership
        $('#filterCheckOwned').is(":checked") ? activeOwnershipFilters.add('Owned') : activeOwnershipFilters.delete('Owned');
        $('#filterCheckMissing').is(":checked") ? activeOwnershipFilters.add('Missing') : activeOwnershipFilters.delete('Missing');

        // Update
        $('#filterCheckUpToDate').is(":checked") ? activeUpdateFilters.add('Up to date') : activeUpdateFilters.delete('Up to date');
        $('#filterCheckMissingUpdate').is(":checked") ? activeUpdateFilters.add('Outdated') : activeUpdateFilters.delete('Outdated');

        // Completion
        $('#filterCheckComplete').is(":checked") ? activeCompletionFilters.add('Complete') : activeCompletionFilters.delete('Complete');
        $('#filterCheckMissingDlc').is(":checked") ? activeCompletionFilters.add('Missing DLC') : activeCompletionFilters.delete('Missing DLC');

        // Special
        $('#filterCheckUnrecognized').is(":checked") ? activeSpecialFilters.add('Unrecognized') : activeSpecialFilters.delete('Unrecognized');
        $('#filterCheckOverridden').is(":checked") ? activeSpecialFilters.add('Overridden') : activeSpecialFilters.delete('Overridden');
    }

    function findCommonElements(...arrays) {
        // Filter out empty arrays
        const nonEmptyArrays = arrays.filter(array => Array.isArray(array) && array.length > 0);

        // If there are no non-empty arrays, return an empty array
        if (nonEmptyArrays.length === 0) {
            return [];
        }

        // Find common elements
        return nonEmptyArrays.reduce((common, currentArray) => 
            common.filter(item => currentArray.includes(item))
        );
    }

    // Function to apply filters and show/hide game cards with animation
    function applyFilters() {
        if (!Array.isArray(games)) {
            games = [];
        }

        if (
            activeTypeFilters.size === 0 &&
            activeOwnershipFilters.size === 0 &&
            activeUpdateFilters.size === 0 &&
            activeCompletionFilters.size === 0 &&
            activeSpecialFilters.size === 0
        ) {
            filteredGames = games.slice();
        } else {
            let gamesFilteredByType = [];
            let gamesFilteredByOwnership = [];
            let gamesFilteredByUpdate = [];
            let gamesFilteredByCompletion = [];
            let gamesFilteredBySpecial = [];

            if (activeTypeFilters.size > 0) {
                for (let type of activeTypeFilters) {
                    gamesFilteredByType = gamesFilteredByType.concat(games.filter(game => game.app_type === type));
                }
            }

            if (activeOwnershipFilters.has("Owned")) {
                gamesFilteredByOwnership = gamesFilteredByOwnership.concat(games.filter(game => game.owned === true));
            }
            if (activeOwnershipFilters.has("Missing")) {
                gamesFilteredByOwnership = gamesFilteredByOwnership.concat(games.filter(game => game.owned === false));
            }

            if (activeUpdateFilters.has("Up to date")) {
                gamesFilteredByUpdate = gamesFilteredByUpdate.concat(games.filter(game => game.has_latest_version === true));
            }
            if (activeUpdateFilters.has("Outdated")) {
                gamesFilteredByUpdate = gamesFilteredByUpdate.concat(games.filter(game => game.has_latest_version === false));
            }
            
            if (activeCompletionFilters.has("Complete")) {
                gamesFilteredByCompletion = gamesFilteredByCompletion.concat(games.filter(game => game.has_all_dlcs === true));
            }
            if (activeCompletionFilters.has("Missing DLC")) {
                gamesFilteredByCompletion = gamesFilteredByCompletion.concat(games.filter(game => game.has_all_dlcs === false));
            }

            // Special
            if (activeSpecialFilters.has("Unrecognized")) {
                gamesFilteredBySpecial = gamesFilteredBySpecial.concat(games.filter(game => isUnrecognizedGame(game)));
            }
            if (activeSpecialFilters.has("Overridden")) {
                gamesFilteredBySpecial = gamesFilteredBySpecial.concat(games.filter(game => hasActiveOverride(game)));
            }

            // Find common elements
            filteredGames = findCommonElements(
                games,
                gamesFilteredByType,
                gamesFilteredByOwnership,
                gamesFilteredByUpdate,
                gamesFilteredByCompletion,
                gamesFilteredBySpecial
            );
        }

        currentPage = 1;
        renderGames();

        // If user has a search term typed, re-apply it to the updated dataset
        const savedSearch = $('#textFilter').val();
        if (savedSearch && savedSearch.trim().length) {
            filterBySearchText(savedSearch);
        }
    }

    // ---------- Override editor ----------
    function openOverrideEditor(game) {
        // Prefill with existing override (if any)
        const k = keyForGame(game);
        const ovr = k ? overridesByKey.get(k) : null;

        $('#ovr-id').val(ovr?.id || '');
        $('#ovr-title-id').val(game.title_id || '');
        $('#ovr-file-basename').val(game.file_basename || '');
        $('#ovr-file-name').text(game.file_basename || '');

        $('#ovr-name').val(ovr?.name ?? (game.title_id_name || game.name || ''));
        $('#ovr-publisher').val(ovr?.publisher ?? (game.publisher || ''));
        $('#ovr-region').val(ovr?.region ?? '');
        $('#ovr-description').val(ovr?.description ?? '');
        $('#ovr-version').val(ovr?.version ?? '');

        $('#btn-reset-override').toggle(!!ovr?.id);

        // reset artwork state
        bannerFileToUpload = null;
        bannerRemoveRequested = false;
        iconFileToUpload = null;
        iconRemoveRequested = false;
        $('#ovr-banner-file').val('');
        $('#ovr-icon-file').val('');

        // Determine current sources
        const ovrBanner = ovr?.banner_path || ovr?.bannerUrl || null;
        const ovrIcon   = ovr?.icon_path   || ovr?.iconUrl   || null;

        const gameBanner = game.banner_path || game.bannerUrl || game.banner || null;
        const gameIcon   = game.iconUrl || null;

        // If we have override artwork, append the cache-buster so the modal sees the just-saved file.
        let currentBanner = ovrBanner ? addBuster(ovrBanner) : (gameBanner || null);
        let currentIcon   = ovrIcon   ? addBuster(ovrIcon)   : (gameIcon   || null);


        // Always show previews, fill with placeholders if absent
        if (!currentBanner && currentIcon) {
            // derive banner from icon for parity
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 400; canvas.height = 225;
                const ctx = canvas.getContext('2d');
                const scale = Math.max(400 / img.width, 225 / img.height);
                const w = Math.round(img.width * scale);
                const h = Math.round(img.height * scale);
                const dx = Math.round((400 - w) / 2);
                const dy = Math.round((225 - h) / 2);
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.clearRect(0,0,400,225);
                ctx.drawImage(img, dx, dy, w, h);
                $('#ovr-banner-preview-img').attr('src', canvas.toDataURL('image/png'));
                $('#ovr-banner-preview-img').data('ovr', !!ovrBanner);
                $('#ovr-banner-remove').toggle(!!ovrBanner);
            };
            img.src = currentIcon;
        } else {
            $('#ovr-banner-preview-img').attr('src', currentBanner || DEFAULT_BANNER);
            $('#ovr-banner-preview-img').data('ovr', !!ovrBanner);
            $('#ovr-banner-remove').toggle(!!ovrBanner);
        }

        if (!currentIcon && currentBanner) {
            // derive icon from banner for parity
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 400; canvas.height = 400;
                const ctx = canvas.getContext('2d');
                const scale = Math.max(400 / img.width, 400 / img.height);
                const w = Math.round(img.width * scale);
                const h = Math.round(img.height * scale);
                const dx = Math.round((400 - w) / 2);
                const dy = Math.round((400 - h) / 2);
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.clearRect(0,0,400,400);
                ctx.drawImage(img, dx, dy, w, h);
                $('#ovr-icon-preview-img').attr('src', canvas.toDataURL('image/png'));
                $('#ovr-icon-preview-img').data('ovr', !!ovrIcon);
                $('#ovr-icon-remove').toggle(!!ovrIcon);
            };
            img.src = currentBanner;
        } else {
            $('#ovr-icon-preview-img').attr('src', currentIcon || DEFAULT_ICON);
            $('#ovr-icon-preview-img').data('ovr', !!ovrIcon);
            $('#ovr-icon-remove').toggle(!!ovrIcon);
        }

        overrideModal().show();
    }

    // Utility: normalize string to null if blank
    function nv(v){ const s = (v ?? '').toString().trim(); return s.length ? s : null; }
    function numOrNull(v){ const s = (v ?? '').toString().trim(); return s ? Number(s) : null; }

    // After a successful save/delete, update in-memory map and affected game objects, then re-render.
    function finishOverrideMutationAndRefresh(modifiedKey) {
        // Apply name overlay (doesn't touch any backend fields)
        applyOverrideToGamesByKey(modifiedKey);

        // Re-apply filters and render (star + filters derive from overridesByKey)
        applyFilters();

        overrideModal().hide();
    }

    async function saveOverride() {
        const id = $('#ovr-id').val().trim();
        const title_id = $('#ovr-title-id').val().trim();
        const file_basename = $('#ovr-file-basename').val().trim();

        const key = title_id ? title_id : (file_basename ? ('file:' + file_basename) : '');

        // Build payload fields
        const payload = {
            name: nv($('#ovr-name').val()),
            publisher: nv($('#ovr-publisher').val()),
            region: nv($('#ovr-region').val()),
            description: nv($('#ovr-description').val()),
            version: numOrNull($('#ovr-version').val()),
            enabled: true
        };
        if (title_id) payload.title_id = title_id;
        else if (file_basename) payload.file_basename = file_basename;

        const needMultipart = !!(bannerFileToUpload || bannerRemoveRequested || iconFileToUpload || iconRemoveRequested);

        let url, method, options;
        if (id) {
            url = `/api/overrides/${id}`;
            method = 'PUT';
        } else {
            url = '/api/overrides';
            method = 'POST';
        }

        if (needMultipart) {
            // multipart/form-data
            const fd = new FormData();
            Object.entries(payload).forEach(([k, v]) => {
                if (v !== undefined && v !== null) fd.append(k, String(v));
            });
            if (bannerFileToUpload) fd.append('banner_file', bannerFileToUpload);
            if (bannerRemoveRequested) fd.append('banner_remove', 'true');

            if (iconFileToUpload)   fd.append('icon_file', iconFileToUpload);
            if (iconRemoveRequested) fd.append('icon_remove', 'true');

            options = { method, body: fd };
        } else {
            // application/json
            options = {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            };
        }

        let res;
        try {
            res = await fetch(url, options);
        } catch (e) {
            alert('Failed to save override');
            return;
        }

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            alert(err?.error || 'Failed to save override');
            return;
        }

        // Clear transient artwork state after a successful save
        bannerFileToUpload = null;
        bannerRemoveRequested = false;
        iconFileToUpload = null;
        iconRemoveRequested = false;
        $('#ovr-banner-file').val('');
        $('#ovr-icon-file').val('');

        let saved = null;
        try { saved = await res.json(); } catch { /* some APIs return no body */ }

        if (saved && (saved.title_id || saved.file_basename)) {
            const k = keyForOverride(saved);
            if (k) {
                overridesByKey.set(k, saved);
                ARTWORK_BUSTER++; // force-refresh override artwork
                finishOverrideMutationAndRefresh(k);
                return;
            }
        }

        // Fallback: refetch and refresh
        await fetchOverrides();
        ARTWORK_BUSTER++; // force-refresh override artwork
        finishOverrideMutationAndRefresh(key);
    }

    async function resetOverride() {
        const id = $('#ovr-id').val().trim();
        if (!id) return;
        if (!confirm('Remove override and revert to default metadata?')) return;

        try {
            const res = await fetch(`/api/overrides/${id}`, { method: 'DELETE' });
            if (!res.ok) {
                alert('Failed to delete override');
                return;
            }
        } catch {
            alert('Failed to delete override');
            return;
        }

        // Figure out which key was affected before we refetch
        const title_id = $('#ovr-title-id').val().trim();
        const file_basename = $('#ovr-file-basename').val().trim();
        const key = title_id ? title_id : (file_basename ? ('file:' + file_basename) : '');

        // Update local map: remove key and update UI immediately
        if (key && overridesByKey.has(key)) {
            overridesByKey.delete(key);
        } else {
            // If we don't know, just refresh overrides to stay in sync
            await fetchOverrides();
        }

        ARTWORK_BUSTER++; // force-refresh override artwork
        finishOverrideMutationAndRefresh(key);
    }

    $('#btn-save-override').click(saveOverride);
    $('#btn-reset-override').click(resetOverride);

</script>
{% endblock %}
